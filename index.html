<script>
  async function loadComponent(id, file) {
    const res = await fetch(file);
    const html = await res.text();
    document.getElementById(id).innerHTML = html;
  }

  Promise.all([
    loadComponent('navbar-container',    'sections/navbar.html'),
    loadComponent('hero-container',      'sections/hero.html'),
    loadComponent('destacados-container','sections/destacados.html'),
    loadComponent('menu-container',      'sections/menu.html'),
    loadComponent('about-container',     'sections/about.html'),
    loadComponent('valores-container',   'sections/valores.html'),
    loadComponent('horario-container',   'sections/horario.html'),
  ]).then(() => {
    const script = document.createElement('script');
    script.src = 'js/main.js';
    document.body.appendChild(script);
  });
</script>
