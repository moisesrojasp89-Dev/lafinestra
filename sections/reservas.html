          <button type="button" class="rf-chip" data-val="5">5</button>
          <button type="button" class="rf-chip" data-val="6">6</button>
          <button type="button" class="rf-chip" data-val="7">7</button>
          <button type="button" class="rf-chip" data-val="8">8</button>
          <button type="button" class="rf-chip" data-val="9">9</button>

<style>

  background-color: #0f0f0f;

<script>
// Chips seleccionables
document.querySelectorAll('#res-hora-chips .rf-chip').forEach(chip => {
  chip.addEventListener('click', () => {
    document.querySelectorAll('#res-hora-chips .rf-chip').forEach(c => c.classList.remove('activo'));
    chip.classList.add('activo');
  });
});

document.querySelectorAll('#res-personas-chips .rf-chip').forEach(chip => {
  chip.addEventListener('click', () => {
    document.querySelectorAll('#res-personas-chips .rf-chip').forEach(c => c.classList.remove('activo'));
    chip.classList.add('activo');
  });
});

// Enviar reserva por WhatsApp
function enviarReserva() {
  const nombre  = document.getElementById('res-nombre').value.trim();
  const fecha   = document.getElementById('res-fecha').value;
  const hora    = document.querySelector('#res-hora-chips .rf-chip.activo')?.dataset.val;
  const personas = document.querySelector('#res-personas-chips .rf-chip.activo')?.dataset.val;
  const notas   = document.getElementById('res-notas').value.trim();
  const error   = document.getElementById('rf-error');

  // Validar
  if (!nombre || !fecha || !hora || !personas) {
    error.classList.add('visible');
    return;
  }
  error.classList.remove('visible');

  // Formatear fecha legible
  const [y, m, d] = fecha.split('-');
  const diasSemana = ['Domingo','Lunes','Martes','Miércoles','Jueves','Viernes','Sábado'];
  const meses = ['enero','febrero','marzo','abril','mayo','junio','julio','agosto','septiembre','octubre','noviembre','diciembre'];
  const fechaObj = new Date(y, m - 1, d);
  const fechaLegible = `${diasSemana[fechaObj.getDay()]} ${d} de ${meses[m-1]} de ${y}`;

  // Armar mensaje
  let msg = `📅 *Reserva en La Finestra*\n\n`;
  msg += `👤 *Nombre:* ${nombre}\n`;
  msg += `📆 *Fecha:* ${fechaLegible}\n`;
  msg += `🕐 *Hora:* ${hora}\n`;
  msg += `👥 *Personas:* ${personas}\n`;
  if (notas) msg += `📝 *Notas:* ${notas}\n`;
  msg += `\n_Enviado desde lafinestra.vercel.app_`;

  const url = `https://wa.me/584247827899?text=${encodeURIComponent(msg)}`;
  window.open(url, '_blank');
}
</script>
